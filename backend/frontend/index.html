<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>recallibrate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@400;500&display=swap" rel="stylesheet">
    <script src="lucide.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 class="logo"><em>recall</em>ibrate</h1>
        <div class="theme-toggle">
                <button data-theme-btn="light"><i data-lucide="sun"></i></button>
                <button data-theme-btn="system"><i data-lucide="monitor"></i></button>
                <button data-theme-btn="dark"><i data-lucide="moon"></i></button>
            <div class="pill"></div>
        </div>
    </header>
        <main>
            <section id="connect">
                <input type="text" id="db-url" placeholder="postgres://...">
                <button id="connect-btn">Connect</button>
            </section>
            <div id="table-view">
                <button id="back-btn"><i data-lucide="arrow-left"></i></button>
                <span id="table-name"></span>
                <input type="text" id="search-input" placeholder="Search...">
            </div>
            <input type="text" id="table-filter" placeholder="Filter tables...">
            <section id="tables">

            </section>
            
            <section id="search">

            </section>
            
            <section id="results">
                
            </section>
        </main>
        <script src="app.js">
            
        </script>

</body>
</html>
